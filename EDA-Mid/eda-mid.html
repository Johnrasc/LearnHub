<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Data Analysis | Reviewer Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="eda-style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <canvas id="bg-animation"></canvas>

    <nav class="quiz-nav">
        <a href="../index.html" class="back-link">
            <span class="nav-icon">←</span> BACK TO HUB
        </a>
        <div class="subject-badge">Midterm | Engineering Data Analysis</div>
    </nav>

    <main class="quiz-wrapper">
        <div class="quiz-card" id="quiz-box">
            <div class="progress-section">
                <div class="progress-text">Progress: <span id="progress-percent">0%</span>
                </div>
                    <div class="progress-container">
                        <div class="progress-bar" id="progress-fill">
                        </div>
                    </div>
            </div>
            
            <div class="question-header">
                <div class="q-number">QUESTION <span id="q-num">1</span></div>
                <h1 id="question-text">Initializing system...</h1>
            </div>

            <div class="options-grid" id="options-container">
                </div>

            <div id="feedback" class="feedback-toast"></div>
        </div>

        <div class="result-card hidden" id="result-box">
            <div class="result-glow"></div>
            <div class="result-icon">🏆</div>
            <h2>Session Complete</h2>
            <p>You have successfully processed the module data.</p>
            
            <div class="score-summary">
                <div class="score-circle">
                    <span id="score-val">0</span>
                    <small>ACCURACY</small>
                </div>
            </div>

            <div class="result-actions">
                <button class="btn-retro" onclick="location.reload()">RETRY SESSION</button>
                <a href="../index.html" class="btn-outline">RETURN TO HUB</a>
            </div>
        </div>
    </main>

    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2105/2105-preview.mp3" preload="auto"></audio>
    <audio id="snd-tada" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>

    <script src="eda-script.js"></script>
    <script src="../hub-animation.js"></script>
</body>
</html>
